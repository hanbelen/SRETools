global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'zammad'
  routes:
    - match:
        severity: critical
      receiver: 'zammad'

receivers:
  - name: 'zammad'
    webhook_configs:
      - url: 'http://zammad-railsserver:8080/api/v1/tickets'
        send_resolved: true
        http_config:
          headers:
            Authorization: 'Token token=zammad_api_token_here'
            Content-Type: 'application/json'

inhibit_rules: []
